<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airbnb | Add your home</title>
    <link rel="stylesheet" href="/output.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .text-airbnb { color: #FF385C; }
        .bg-airbnb { background-color: #FF385C; }
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col">
    <!-- Simple Header -->
    <header class="bg-white border-b border-gray-200 py-6">
        <div class="max-w-7xl mx-auto px-4 flex items-center justify-between">
            <a href="/" class="flex items-center cursor-pointer">
                <svg class="h-8 w-auto text-airbnb" viewBox="0 0 32 32" fill="currentColor">
                    <path d="M16 1c2.008 0 3.463.963 4.751 3.269l.533 1.025c1.954 3.83 6.114 12.54 7.1 14.836l.145.353c.667 1.591.91 2.472.96 3.396l.01.415.001.228c0 4.062-2.877 6.478-6.357 6.478-2.224 0-4.556-1.258-6.709-3.386l-.257-.26-.172-.179h-.011l-.176.185c-2.044 2.1-4.392 3.42-6.72 3.42-3.481 0-6.358-2.416-6.358-6.478l.002-.23.011-.413c.045-.91.28-1.776.923-3.32l.183-.429c.985-2.296 5.144-11.006 7.098-14.836l.533-1.025C12.537 1.963 13.992 1 16 1zm0 2c-1.239 0-2.053.539-3.1 2.41l-.536 1.03C10.477 10.157 6.326 18.851 5.353 21.12l-.183.428c-.61 1.464-.783 2.148-.822 2.876l-.008.376-.001.2c0 2.923 1.958 4.478 4.358 4.478 1.83 0 3.732-1.082 5.567-2.992l.278-.297.458-.501.458.501.278.297c1.835 1.91 3.737 2.992 5.567 2.992 2.399 0 4.357-1.555 4.357-4.478l-.001-.2-.008-.376c-.039-.728-.212-1.412-.822-2.876l-.183-.428c-.973-2.269-5.124-10.963-7.094-14.83l-.536-1.03C18.053 3.539 17.24 3 16 3zm0 13a3 3 0 100 6 3 3 0 000-6zm0 2a1 1 0 110 2 1 1 0 010-2z" />
                </svg>
                <span class="ml-2 text-2xl font-bold tracking-tight text-airbnb">airbnb</span>
            </a>
            <span class="text-gray-500 text-sm font-semibold">Step 1 of 3</span>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white rounded-2xl shadow-xl border border-gray-200 p-8 max-w-md w-full">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Host your home</h1>
            <p class="text-gray-500 mb-8">Share your space with travelers from around the world.</p>

            <form action="/host/add-home" method="POST" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-2 tracking-wider">House Name</label>
                    <input type="text" name="houseName" placeholder="e.g. Seaside Sanctuary" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-airbnb focus:border-transparent transition">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-2 tracking-wider">Description (Optional)</label>
                    <textarea placeholder="Tell us about your space..." 
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-airbnb focus:border-transparent transition h-32"></textarea>
                </div>

                <button type="submit" 
                    class="w-full bg-airbnb text-white py-4 rounded-lg font-bold text-lg hover:bg-opacity-90 transition transform active:scale-95 shadow-md">
                    Finish & List
                </button>
            </form>
            
            <div class="mt-6 text-center">
                <a href="/" class="text-gray-400 hover:text-gray-600 text-sm transition">Cancel and go back</a>
            </div>
        </div>
    </main>

    <footer class="py-6 text-center text-gray-400 text-xs">
        &copy; 2026 Airbnb Hosting Essentials
    </footer>
</body>

</html>
